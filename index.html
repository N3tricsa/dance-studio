<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Танцевальная студия «ИНФИНИТИ»</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

<body>
    <!-- ... шапка и меню ... -->
    <section class="schedule-section">
        <div class="section-title">
            <i class="fas fa-table"></i> Расписание занятий
        </div>
        <div class="table-wrapper">
            <div id="schedule-status">Загрузка расписания...</div>
            <table id="dynamic-schedule">
                <thead>
                    <tr>
                        <th>Время</th>
                        <th>Пн <span class="date">13.07</span></th>
                        <th>Вт <span class="date">14.07</span></th>
                        <th>Ср <span class="date">15.07</span></th>
                        <th>Чт <span class="date">16.07</span></th>
                        <th>Пт <span class="date">17.07</span></th>
                        <th>Сб <span class="date">18.07</span></th>
                        <th>Вс <span class="date">19.07</span></th>
                    </tr>
                </thead>
                <tbody>
                    <!-- сюда скрипт вставит строки -->
                </tbody>
            </table>
        </div>
        <!-- ... подпись ... -->
    </section>
    <!-- ... подвал ... -->
    <script src="schedule.js"></script>
